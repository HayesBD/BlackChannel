name: deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AZURE_RG: blackchannel
  APP_NAME: blackchannel
  SWA_LOCATION: eastasia

jobs:
  # ---------------------------------------------------------------------------
  # 1. Provision infra (storage, SignalR, Flex Functions, SWA). Outputs the
  #    generated resource names/hosts for the later jobs.
  # ---------------------------------------------------------------------------
  infra:
    runs-on: ubuntu-latest
    outputs:
      functionName:   ${{ steps.infra.outputs.functionName }}
      functionHost:   ${{ steps.infra.outputs.functionHost }}
      staticSiteName: ${{ steps.infra.outputs.staticSiteName }}
      staticSiteHost: ${{ steps.infra.outputs.staticSiteHost }}
      signalRName:    ${{ steps.infra.outputs.signalRName }}
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Ensure resource group exists
        run: az group create -n ${{ env.AZURE_RG }} -l australiaeast --only-show-errors
      - name: Deploy infra (Bicep)
        id: infra
        uses: azure/arm-deploy@v2
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.AZURE_RG }}
          template: infra/main.bicep
          parameters: appName=${{ env.APP_NAME }} swaLocation=${{ env.SWA_LOCATION }}
          failOnStdErr: false

  # ---------------------------------------------------------------------------
  # 2. Build the native apps (Android APK + unpackaged Windows ZIP) on a Windows
  #    runner, baked with the deployed Function URL, and hand them to the deploy
  #    job. No Azure creds needed here — pure build + artifact upload.
  # ---------------------------------------------------------------------------
  build-apps:
    needs: infra
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install MAUI workloads
        run: dotnet workload install maui android --ignore-failed-sources
      - name: Build APK + Windows ZIP (baked with the deployed API URL)
        shell: pwsh
        run: ./build-apps.ps1 -ApiBaseUrl "https://${{ needs.infra.outputs.functionHost }}/api/"
      - name: Upload native packages
        uses: actions/upload-artifact@v4
        with:
          name: native-apps
          path: src/BlackChannel.Web/wwwroot/download/*
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # 3. Deploy the Functions backend and the Blazor site (with the native
  #    packages folded into wwwroot/download so the /download buttons work).
  # ---------------------------------------------------------------------------
  deploy:
    needs: [ infra, build-apps ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set Function PUBLIC_SITE_URL
        run: |
          az functionapp config appsettings set \
            -g ${{ env.AZURE_RG }} -n ${{ needs.infra.outputs.functionName }} \
            --settings "PUBLIC_SITE_URL=https://${{ needs.infra.outputs.staticSiteHost }}"

      # ---------- Functions ----------
      - name: Publish Functions
        run: dotnet publish src/BlackChannel.Functions -c Release -o publish/functions
      - name: Zip Functions
        run: |
          cd publish/functions
          zip -r ../functions.zip .
      - name: Deploy Functions
        run: |
          az functionapp deployment source config-zip \
            -g ${{ env.AZURE_RG }} -n ${{ needs.infra.outputs.functionName }} \
            --src publish/functions.zip

      # ---------- Native packages from the build-apps job ----------
      - name: Download native packages into wwwroot/download
        uses: actions/download-artifact@v4
        with:
          name: native-apps
          path: src/BlackChannel.Web/wwwroot/download

      # ---------- Blazor WASM ----------
      - name: Patch Blazor config + CSP
        shell: bash
        run: |
          FUNC_HOST="${{ needs.infra.outputs.functionHost }}"
          SIGNALR_HOST="${{ needs.infra.outputs.signalRName }}.service.signalr.net"
          jq --arg api "https://${FUNC_HOST}/api/" '.apiBaseUrl = $api' \
            src/BlackChannel.Web/wwwroot/appsettings.json > /tmp/appsettings.json
          mv /tmp/appsettings.json src/BlackChannel.Web/wwwroot/appsettings.json
          CSP="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://${FUNC_HOST} wss://${SIGNALR_HOST} https://${SIGNALR_HOST}; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
          jq --arg csp "$CSP" '.globalHeaders."Content-Security-Policy" = $csp' \
            src/BlackChannel.Web/wwwroot/staticwebapp.config.json > /tmp/swa.json
          mv /tmp/swa.json src/BlackChannel.Web/wwwroot/staticwebapp.config.json

      - name: Publish Blazor WASM
        run: dotnet publish src/BlackChannel.Web -c Release -o publish/web

      - name: Get SWA deployment token
        id: swatoken
        shell: bash
        run: |
          TOKEN=$(az staticwebapp secrets list -n ${{ needs.infra.outputs.staticSiteName }} \
            -g ${{ env.AZURE_RG }} --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Blazor to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swatoken.outputs.token }}
          action: upload
          app_location: publish/web/wwwroot
          skip_app_build: true
          skip_api_build: true

      - name: Allow SWA origin in Function CORS
        run: |
          SWA_ORIGIN="https://${{ needs.infra.outputs.staticSiteHost }}"
          CURRENT=$(az functionapp cors show -g ${{ env.AZURE_RG }} -n ${{ needs.infra.outputs.functionName }} --query "allowedOrigins" -o tsv)
          if ! echo "$CURRENT" | grep -q "$SWA_ORIGIN"; then
            az functionapp cors add -g ${{ env.AZURE_RG }} -n ${{ needs.infra.outputs.functionName }} --allowed-origins "$SWA_ORIGIN"
          fi

      - name: Summary
        run: |
          echo "::notice title=Site::https://${{ needs.infra.outputs.staticSiteHost }}"
          echo "::notice title=API::https://${{ needs.infra.outputs.functionHost }}/api"
